services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kfc_forecast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - kfc_forecast_data:/var/lib/postgresql/data
      - ./apps/forecast-api/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kfc_forecast"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/forecast-api
    environment:
      PORT: 3001
      CORS_ORIGIN: "[http://localhost:5173]"
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: kfc_forecast
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      FORECAST_CONFIG_PATH: ./config/forecast.config.json
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/forecast-web
      args:
        VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  kfc_forecast_data:
